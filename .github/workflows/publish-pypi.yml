name: Publish worldoftaxonomy-mcp to PyPI

# Triggers on a tag of the shape `v0.1.0`. Matches the version in
# pyproject.toml. To cut a release:
#
#   1. Bump `version = "X.Y.Z"` in pyproject.toml on main.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
#
# The workflow builds a wheel + sdist, then publishes to PyPI via
# OIDC trusted publishing (no PyPI token stored in the repo). To
# bootstrap: in the PyPI project settings, add this workflow as a
# trusted publisher (`worldoftaxonomy-mcp`, `colaberry/WorldOfTaxonomy`,
# `publish-pypi.yml`, environment `pypi`).
#
# Read more: https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify tag matches pyproject.toml version
        id: version
        run: |
          set -eu
          tag="${GITHUB_REF#refs/tags/v}"
          # Read version from pyproject.toml without an extra dep.
          file_ver=$(python -c "
          import tomllib
          print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])
          ")
          if [ "$tag" != "$file_ver" ]; then
            echo "::error::Tag v$tag does not match pyproject.toml version $file_ver"
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        run: python -m build

      - name: Smoke-test the wheel installs and entry-point fails closed
        run: |
          set -eu
          # Install in a clean venv.
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install dist/*.whl
          # Without env vars, must exit 2 with the actionable message.
          set +e
          out=$(WOT_API_KEY="" DATABASE_URL="" /tmp/smoke/bin/worldoftaxonomy-mcp 2>&1)
          rc=$?
          set -e
          if [ "$rc" != "2" ]; then
            echo "::error::expected exit 2 with no creds, got $rc"
            exit 1
          fi
          echo "$out" | grep -q WOT_API_KEY || {
            echo "::error::missing-creds message did not mention WOT_API_KEY"
            exit 1
          }
          echo "smoke OK"

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/worldoftaxonomy-mcp
    permissions:
      # Required for OIDC trusted publishing.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publisher is configured at PyPI; no token here.
        with:
          packages-dir: dist/
          verify-metadata: true
          skip-existing: false
