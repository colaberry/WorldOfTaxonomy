name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python backend tests ──────────────────────────────────────────────────
  test:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -e '.[dev]'

      - name: Run tests with coverage
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install pytest-cov
          python3 -m pytest tests/ -v --tb=short \
            --cov=world_of_taxonomy \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

      - name: Check for em-dashes
        run: |
          if grep -r $'\xe2\x80\x94' \
            --include="*.py" --include="*.md" --include="*.ts" --include="*.tsx" --include="*.sql" \
            --exclude-dir=node_modules --exclude-dir=.git \
            world_of_taxonomy/ tests/ frontend/src/ *.md; then
            echo "ERROR: em-dash characters found. Use a hyphen - instead."
            exit 1
          fi
          echo "No em-dashes found."

      - name: Check MCP tool count references are consistent
        run: python scripts/check_mcp_tool_count.py

      - name: Check llms-full.txt is up to date
        run: |
          python scripts/build_llms_txt.py
          if ! git diff --exit-code frontend/public/llms-full.txt; then
            echo "ERROR: frontend/public/llms-full.txt is stale."
            echo "Run 'python scripts/build_llms_txt.py' locally and commit the result."
            exit 1
          fi
          echo "llms-full.txt is up to date."

  # ── Frontend TypeScript build ─────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build
