{% extends "base.html" %}

{% block title %}Explorer — WorldOfTaxanomy{% endblock %}

{% block head %}
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  .explorer-container {
    width: 100%;
    height: calc(100vh - 80px);
    position: relative;
    overflow: hidden;
  }
  .explorer-container svg {
    width: 100%;
    height: 100%;
  }
  /* Breadcrumb trail */
  .explorer-breadcrumb {
    position: absolute;
    top: 16px;
    left: 24px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
  }
  .explorer-breadcrumb .crumb {
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    background: var(--bg-elevated);
    border: 1px solid rgba(255,255,255,0.06);
    transition: all var(--duration-short);
    font-family: 'Geist Mono', monospace;
    font-size: 0.75rem;
  }
  .crumb:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }
  .crumb.active {
    color: var(--accent);
    border-color: rgba(59,130,246,0.3);
  }
  .crumb-sep {
    color: var(--text-muted);
    opacity: 0.4;
  }
  /* Info panel */
  .explorer-info {
    position: absolute;
    bottom: 24px;
    left: 24px;
    right: 24px;
    z-index: 10;
    pointer-events: none;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .explorer-hint {
    color: var(--text-muted);
    font-size: 0.75rem;
    background: var(--bg-surface);
    padding: 8px 16px;
    border-radius: var(--radius-md);
    border: 1px solid rgba(255,255,255,0.06);
    pointer-events: auto;
  }
  .explorer-detail {
    background: var(--bg-surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    max-width: 360px;
    pointer-events: auto;
    display: none;
  }
  .explorer-detail.visible {
    display: block;
  }
  .explorer-detail .detail-code {
    font-family: 'Geist Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .explorer-detail .detail-title {
    font-family: 'Instrument Serif', serif;
    font-size: 1.2rem;
    margin-bottom: 8px;
  }
  .explorer-detail .detail-meta {
    font-size: 0.75rem;
    color: var(--text-secondary);
  }
  .explorer-detail .detail-actions {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }
  .explorer-detail .detail-actions a {
    font-size: 0.75rem;
    padding: 4px 12px;
    border-radius: var(--radius-sm);
    background: var(--accent-dim);
    color: var(--accent);
    pointer-events: auto;
  }
</style>
{% endblock %}

{% block content %}
<div class="explorer-container" id="explorer-canvas">
  <!-- Breadcrumb -->
  <div class="explorer-breadcrumb" id="explorer-breadcrumb"></div>

  <!-- Bottom bar -->
  <div class="explorer-info">
    <div class="explorer-hint" id="explorer-hint">
      Click a bubble to explore deeper. Right-click or press Esc to go back.
    </div>
    <div class="explorer-detail" id="explorer-detail">
      <div class="detail-code" id="detail-code"></div>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-meta" id="detail-meta"></div>
      <div class="detail-actions" id="detail-actions"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/api-client.js"></script>
<script src="/static/js/explorer.js"></script>
{% endblock %}
