# Cloud Build pipeline - build + push + deploy both services to Cloud Run.
#
# Trigger: push to `main` branch of colaberry/WorldOfTaxonomy
# Services:
#   wot-api  -> FastAPI backend  (Dockerfile.backend, port 8000)
#   wot-web  -> Next.js frontend (frontend/Dockerfile.prod, port 3000)
#
# Ordering: wot-api is built, pushed, and DEPLOYED first. Its live URL is then
# captured and passed as --build-arg BACKEND_URL=... when building wot-web so
# Next.js bakes the real backend URL into its compiled rewrites. (If instead
# BACKEND_URL is only injected at Cloud Run runtime, `next build` has already
# hardcoded http://localhost:8000 into the routing output.)
#
# Required trigger substitutions:
#   _REGION         us-east1
#   _REPO           wot-repo
#   _INSTANCE_CONN  PROJECT:REGION:INSTANCE   (e.g. colaberry-wot:us-east1:wot-db)
#
# See docs/handover/runbooks/gcp-deploy.md for one-time infra setup.

steps:
  # --- Backend ---
  # Build backend image (root context, Dockerfile.backend)
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f=Dockerfile.backend
      - -t=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-api:$SHORT_SHA
      - -t=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-api:latest
      - .
    waitFor: ['-']

  - id: push-api
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-api
    waitFor: ['build-api']

  # Run Alembic migrations against the production DB BEFORE deploying new api code.
  # Uses a Cloud Run Job (re-created each run) pinned to the freshly-built image so
  # the migrations match the code about to deploy. Cloud Run Jobs auto-attach Cloud
  # SQL via Unix socket and mount DATABASE_URL from Secret Manager.
  #
  # If this step fails (broken migration, DB unreachable, etc.), the deploy-api step
  # will NOT run - protecting prod from schema/code skew like the one that hit us on
  # the first auto-deploy (0001_baseline -> 0002_node_url_template was never applied).
  - id: migrate-db
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-api:$SHORT_SHA"
        JOB="wot-migrate"
        if gcloud run jobs describe "$$JOB" --region=${_REGION} --project=$PROJECT_ID >/dev/null 2>&1; then
          echo "Updating existing $$JOB job with image $$IMAGE"
          gcloud run jobs update "$$JOB" \
            --image="$$IMAGE" \
            --region=${_REGION} \
            --project=$PROJECT_ID \
            --set-cloudsql-instances=${_INSTANCE_CONN} \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest \
            --command=alembic \
            --args=upgrade,head \
            --task-timeout=300 \
            --max-retries=0 \
            --quiet
        else
          echo "Creating new $$JOB job with image $$IMAGE"
          gcloud run jobs create "$$JOB" \
            --image="$$IMAGE" \
            --region=${_REGION} \
            --project=$PROJECT_ID \
            --set-cloudsql-instances=${_INSTANCE_CONN} \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest \
            --command=alembic \
            --args=upgrade,head \
            --task-timeout=300 \
            --max-retries=0 \
            --quiet
        fi
        echo "Executing migration..."
        gcloud run jobs execute "$$JOB" \
          --region=${_REGION} \
          --project=$PROJECT_ID \
          --wait
        echo "Migration complete."
    waitFor: ['push-api']

  # Deploy backend - attach Cloud SQL via Unix socket, mount secrets.
  # waits for migrate-db so schema is always current before new code takes traffic.
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - wot-api
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-api:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=2
      - --concurrency=80
      - --timeout=300s
      - --add-cloudsql-instances=${_INSTANCE_CONN}
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,REPORT_EMAIL=REPORT_EMAIL:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,STRIPE_PRICE_ID_PRO_MONTHLY=STRIPE_PRICE_ID_PRO_MONTHLY:latest,STRIPE_PRICE_ID_PRO_ANNUAL=STRIPE_PRICE_ID_PRO_ANNUAL:latest,STRIPE_PRICE_ID_PRO_OVERAGE=STRIPE_PRICE_ID_PRO_OVERAGE:latest
    waitFor: ['migrate-db']

  # --- Frontend (built AFTER backend URL is known) ---
  # Capture the freshly-deployed wot-api URL and write it to /workspace so
  # subsequent steps can read it. We build the web image with that URL baked
  # in as BACKEND_URL so next.config.ts's rewrites compile against it.
  - id: capture-api-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        API_URL="$$(gcloud run services describe wot-api \
          --region=${_REGION} --format='value(status.url)')"
        echo "Backend URL: $$API_URL"
        echo -n "$$API_URL" > /workspace/backend_url.txt
    waitFor: ['deploy-api']

  - id: build-web
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        BACKEND_URL="$$(cat /workspace/backend_url.txt)"
        docker build \
          -f frontend/Dockerfile.prod \
          --build-arg BACKEND_URL="$$BACKEND_URL" \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-web:$SHORT_SHA \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-web:latest \
          .
    waitFor: ['capture-api-url']

  - id: push-web
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-web
    waitFor: ['build-web']

  # Deploy frontend - BACKEND_URL set as runtime env too (belt + suspenders)
  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        API_URL="$$(cat /workspace/backend_url.txt)"
        gcloud run deploy wot-web \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-web:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=3000 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=2 \
          --concurrency=80 \
          --timeout=300s \
          --set-env-vars=BACKEND_URL=$$API_URL,NODE_ENV=production
    waitFor: ['push-web']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _REGION: us-east1
  _REPO: wot-repo
  _INSTANCE_CONN: ''

timeout: 1800s
