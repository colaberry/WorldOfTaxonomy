# Cloud Build pipeline — build + push + deploy both services to Cloud Run.
#
# Trigger: push to `main` branch of colaberry/WorldOfTaxonomy
# Services:
#   wot-api  -> FastAPI backend  (Dockerfile.backend, port 8000)
#   wot-web  -> Next.js frontend (frontend/Dockerfile.prod, port 3000)
#
# Required trigger substitutions:
#   _REGION         us-east1
#   _REPO           wot-repo
#   _INSTANCE_CONN  PROJECT:REGION:INSTANCE   (e.g. colaberry-wot:us-east1:wot-db)
#
# See docs/runbooks/gcp-deploy.md for one-time infra setup.

steps:
  # Backend image (root context, Dockerfile.backend)
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f=Dockerfile.backend
      - -t=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-api:$SHORT_SHA
      - -t=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-api:latest
      - .
    waitFor: ['-']

  # Frontend image (root context so prebuild can reach ../wiki, ../blog, ../crosswalk-data)
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f=frontend/Dockerfile.prod
      - -t=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-web:$SHORT_SHA
      - -t=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-web:latest
      - .
    waitFor: ['-']

  # Push (each waits only on its own build, so they push in parallel)
  - id: push-api
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-api
    waitFor: ['build-api']

  - id: push-web
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-web
    waitFor: ['build-web']

  # Deploy backend — attach Cloud SQL via Unix socket, mount secrets
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - wot-api
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-api:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=2
      - --concurrency=80
      - --timeout=300s
      - --add-cloudsql-instances=${_INSTANCE_CONN}
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,REPORT_EMAIL=REPORT_EMAIL:latest
    waitFor: ['push-api']

  # Deploy frontend — look up backend URL, inject as BACKEND_URL env var
  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        API_URL="$$(gcloud run services describe wot-api \
          --region=${_REGION} --format='value(status.url)')"
        echo "Backend URL: $$API_URL"
        gcloud run deploy wot-web \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wot-web:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=3000 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=2 \
          --concurrency=80 \
          --timeout=300s \
          --set-env-vars=BACKEND_URL=$$API_URL,NODE_ENV=production
    waitFor: ['push-web', 'deploy-api']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _REGION: us-east1
  _REPO: wot-repo
  _INSTANCE_CONN: ''

timeout: 1800s
